<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프리랜서 정산 대시보드</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  color: #1a1a2e;
}

/* ── 상단 헤더 ── */
.app-header {
  background: #1e293b;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.app-header h1 {
  color: #f1f5f9;
  font-size: 17px;
  font-weight: 700;
  white-space: nowrap;
}
.header-upload {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.upload-btn {
  position: relative;
  background: #334155;
  border: 1.5px dashed #64748b;
  border-radius: 8px;
  padding: 7px 16px;
  cursor: pointer;
  color: #94a3b8;
  font-size: 13px;
  transition: border-color .2s, background .2s;
  white-space: nowrap;
}
.upload-btn:hover { border-color: #3b82f6; background: #1e3a5f; color: #93c5fd; }
.upload-btn.has-file { border-color: #22c55e; background: #14532d44; color: #86efac; }
.upload-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
.header-selects { display: flex; align-items: center; gap: 8px; }
.header-selects label { color: #94a3b8; font-size: 13px; white-space: nowrap; }
.header-selects select, .header-selects input[type=number] {
  background: #334155; border: 1.5px solid #475569; border-radius: 6px;
  color: #e2e8f0; font-size: 13px; padding: 6px 10px; outline: none;
  font-family: inherit;
}
.header-selects select:focus, .header-selects input[type=number]:focus { border-color: #3b82f6; }
.btn-load {
  background: #3b82f6; color: #fff; border: none; border-radius: 7px;
  padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit; white-space: nowrap; transition: background .2s;
}
.btn-load:hover { background: #2563eb; }
.btn-load:disabled { background: #475569; cursor: not-allowed; }

/* ── 탭 ── */
.tabs {
  background: #fff;
  border-bottom: 2px solid #e2e8f0;
  display: flex;
  padding: 0 32px;
}
.tab {
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 600;
  color: #64748b;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.tab:hover { color: #3b82f6; }
.tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

/* ── 공통 컨텐츠 영역 ── */
.view { display: none; padding: 28px 32px; max-width: 1200px; margin: 0 auto; }
.view.active { display: block; }

/* ── 상태 메시지 ── */
.status-bar {
  background: #eef3ff; color: #3b82f6;
  padding: 12px 16px; border-radius: 8px;
  font-size: 13px; margin-bottom: 20px; display: none;
}
.status-bar.error { background: #fff0f0; color: #e05050; }
.status-bar.success { background: #f0fff4; color: #1b7a46; }
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin .7s linear infinite;
  margin-right: 6px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 대시보드 ── */
.summary-bar {
  display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
}
.summary-card {
  background: #fff; border-radius: 12px; padding: 18px 22px;
  box-shadow: 0 1px 6px rgba(0,0,0,.07); flex: 1; min-width: 140px;
}
.summary-card .s-label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
.summary-card .s-value { font-size: 22px; font-weight: 700; color: #1e293b; }
.summary-card .s-sub { font-size: 12px; color: #64748b; margin-top: 2px; }

.freelancer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.fl-card {
  background: #fff; border-radius: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,.07);
  overflow: hidden; cursor: pointer;
  transition: box-shadow .2s, transform .15s;
  border: 2px solid transparent;
}
.fl-card:hover { box-shadow: 0 4px 16px rgba(59,130,246,.15); transform: translateY(-2px); border-color: #93c5fd; }
.fl-card-header {
  background: #f8fafc; padding: 14px 18px;
  border-bottom: 1px solid #e2e8f0;
  display: flex; align-items: center; justify-content: space-between;
}
.fl-name { font-size: 15px; font-weight: 700; color: #1e293b; }
.fl-lang { font-size: 12px; color: #64748b; background: #e2e8f0; padding: 2px 8px; border-radius: 20px; }
.fl-card-body { padding: 14px 18px; }
.fl-stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
.fl-stat { text-align: center; flex: 1; }
.fl-stat .val { font-size: 18px; font-weight: 700; color: #1e293b; }
.fl-stat .lbl { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.fl-stat-divider { width: 1px; background: #e2e8f0; margin: 0 8px; }
.fl-amount {
  margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0;
  display: flex; align-items: baseline; gap: 6px;
}
.fl-amount .amt { font-size: 18px; font-weight: 700; color: #1e293b; }
.fl-amount .currency { font-size: 12px; color: #94a3b8; }
.fl-card-footer {
  padding: 10px 18px; border-top: 1px solid #f0f0f0;
  font-size: 12px; color: #3b82f6; text-align: right;
}

.admin-controls {
  background: #1e293b; border: 1px solid #334155; border-radius: 12px;
  padding: 18px 22px; margin-bottom: 20px;
}
.admin-controls .ac-title {
  color: #94a3b8; font-size: 12px; font-weight: 600; margin-bottom: 14px; text-transform: uppercase; letter-spacing: .05em;
}
.admin-date-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 14px; }
.admin-date-row .adf { display: flex; flex-direction: column; gap: 4px; }
.admin-date-row label { color: #94a3b8; font-size: 11px; }
.admin-date-row input[type=date] {
  background: #334155; border: 1px solid #475569; border-radius: 6px;
  color: #e2e8f0; font-size: 13px; padding: 6px 10px; outline: none; font-family: inherit;
}
.admin-date-row input[type=date]:focus { border-color: #7c3aed; }
.btn-pdf-bulk {
  background: #7c3aed; color: #fff; border: none; border-radius: 8px;
  padding: 10px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: background .2s; white-space: nowrap;
}
.btn-pdf-bulk:hover { background: #6d28d9; }
.btn-pdf-bulk:disabled { background: #4c1d95; opacity: .6; cursor: not-allowed; }
.admin-select-hint { color: #64748b; font-size: 12px; margin-top: 4px; }
.btn-select-all {
  background: none; border: 1px solid #7c3aed; border-radius: 8px;
  color: #a78bfa; font-size: 13px; font-weight: 600; padding: 8px 16px;
  cursor: pointer; font-family: inherit; transition: background .2s, color .2s;
}
.btn-select-all:hover { background: #7c3aed; color: #fff; }
.slack-token-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
}
.btn-slack-save {
  background: #0ea5e9; color: #fff; border: none; border-radius: 6px;
  padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; white-space: nowrap;
}
.btn-slack-save:hover { background: #0284c7; }
.btn-slack-bulk {
  background: #0ea5e9; color: #fff; border: none; border-radius: 8px;
  padding: 10px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: background .2s; white-space: nowrap;
}
.btn-slack-bulk:hover { background: #0284c7; }
.btn-slack-bulk:disabled { background: #0c4a6e; opacity: .6; cursor: not-allowed; }
.btn-slack-send {
  background: none; border: 1px solid #0ea5e9; border-radius: 6px;
  color: #0ea5e9; font-size: 11px; padding: 4px 10px; cursor: pointer;
  font-family: inherit; transition: background .15s, color .15s; white-space: nowrap;
}
.btn-slack-send:hover { background: #0ea5e9; color: #fff; }
.btn-slack-send.sent { background: #22c55e; border-color: #22c55e; color: #fff; }
.btn-clear-file {
  background: none; border: 1px solid #475569; border-radius: 6px;
  color: #94a3b8; font-size: 12px; padding: 5px 10px; cursor: pointer;
  font-family: inherit; white-space: nowrap; transition: border-color .2s, color .2s;
}
.btn-clear-file:hover { border-color: #ef4444; color: #ef4444; }

/* 카드 체크박스 (관리자) */
.fl-card-checkbox {
  position: absolute; top: 14px; right: 14px;
  width: 18px; height: 18px; cursor: pointer; accent-color: #7c3aed;
}
.fl-card { position: relative; }
.fl-card.selected { border-color: #7c3aed; box-shadow: 0 0 0 2px #c4b5fd; }

/* PDF 상태 뱃지 */
.pdf-badge {
  display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; margin-top: 4px;
}
.pdf-badge.pending  { background: #fef3c7; color: #92400e; }
.pdf-badge.done     { background: #d1fae5; color: #065f46; }
.fl-drive-link {
  display: block; font-size: 11px; color: #3b82f6; margin-top: 4px;
  text-decoration: none; word-break: break-all;
}
.fl-drive-link:hover { text-decoration: underline; }
.btn-pdf-regen {
  background: none; border: 1px solid #475569; border-radius: 6px;
  color: #94a3b8; font-size: 11px; padding: 3px 8px; cursor: pointer;
  font-family: inherit; margin-top: 6px; transition: border-color .2s, color .2s;
}
.btn-pdf-regen:hover { border-color: #7c3aed; color: #c4b5fd; }

/* 전체 진행 오버레이 */
.pdf-progress {
  margin-top: 10px; font-size: 13px; color: #a78bfa;
}

/* ── 확인 영역 ── */
.confirm-box {
  background: #fff; border-radius: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,.07);
  padding: 24px 28px; margin-top: 20px; display: none;
}
.confirm-box .confirm-guide {
  font-size: 14px; color: #475569; line-height: 1.7; margin-bottom: 18px;
}
.confirm-box .confirm-guide a {
  color: #3b82f6; text-decoration: none;
}
.btn-confirm {
  background: #22c55e; color: #fff; border: none; border-radius: 8px;
  padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: background .2s;
}
.btn-confirm:hover { background: #16a34a; }
.btn-confirm:disabled { background: #86efac; cursor: not-allowed; }
.confirm-done {
  display: flex; align-items: center; gap: 10px;
  background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 8px;
  padding: 14px 18px;
}
.confirm-done .done-icon { font-size: 20px; }
.confirm-done .done-text { font-size: 14px; color: #15803d; font-weight: 600; }
.confirm-done .done-time { font-size: 12px; color: #4ade80; margin-top: 2px; }

/* 빈 상태 */
.empty-state {
  text-align: center; padding: 80px 20px; color: #94a3b8;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ── 상세 내역 ── */
.detail-toolbar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.detail-toolbar label { font-size: 14px; font-weight: 600; color: #475569; }
.detail-toolbar select {
  padding: 8px 12px; border: 1.5px solid #e0e6ef; border-radius: 8px;
  font-size: 14px; color: #222; outline: none; font-family: inherit; min-width: 180px;
}
.detail-toolbar select:focus { border-color: #3b82f6; }
.detail-info {
  background: #fff; border-radius: 12px; padding: 18px 22px;
  box-shadow: 0 1px 6px rgba(0,0,0,.07); margin-bottom: 20px;
  display: none;
}
.detail-info .info-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;
}
.detail-info .info-item .i-label { font-size: 11px; color: #94a3b8; margin-bottom: 3px; }
.detail-info .info-item .i-value { font-size: 14px; color: #1e293b; font-weight: 500; }

.table-wrap {
  background: #fff; border-radius: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; display: none;
}
.detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.detail-table thead tr { background: #f8fafc; }
.detail-table th {
  padding: 11px 14px; text-align: left; font-size: 12px;
  color: #64748b; font-weight: 600; border-bottom: 1.5px solid #e2e8f0;
  white-space: nowrap;
}
.detail-table td {
  padding: 10px 14px; border-bottom: 1px solid #f1f5f9; color: #334155; vertical-align: middle;
}
.detail-table tbody tr:last-child td { border-bottom: none; }
.detail-table tbody tr:hover td { background: #f8fafc; }
.detail-table .r { text-align: right; }
.detail-table .c { text-align: center; }
.detail-table tfoot tr { background: #f0f7ff; }
.detail-table tfoot td { font-weight: 700; color: #1e293b; border-top: 2px solid #bfdbfe; }
.link-chip {
  display: inline-block; background: #eff6ff; color: #3b82f6;
  border: 1px solid #bfdbfe; border-radius: 5px;
  padding: 2px 8px; font-size: 11px; text-decoration: none; white-space: nowrap;
}
.link-chip:hover { background: #dbeafe; }

/* 링크 복사 버튼 */
.btn-copy-link {
  background: none; border: 1px solid #3b82f6; border-radius: 6px;
  color: #3b82f6; font-size: 11px; padding: 4px 10px; cursor: pointer;
  font-family: inherit; transition: background .15s, color .15s;
  white-space: nowrap;
}
.btn-copy-link:hover { background: #3b82f6; color: #fff; }
.btn-copy-link.copied { background: #22c55e; border-color: #22c55e; color: #fff; }
.btn-reset-confirm {
  background: none; border: 1px solid #f87171; border-radius: 6px;
  color: #f87171; font-size: 11px; padding: 4px 10px; cursor: pointer;
  font-family: inherit; transition: background .15s, color .15s; white-space: nowrap;
}
.btn-reset-confirm:hover { background: #f87171; color: #fff; }

/* 토큰 모드 프롬프트 */
.token-prompt {
  text-align: center; padding: 40px 20px;
}
.token-prompt .token-prompt-icon { font-size: 48px; margin-bottom: 16px; }
.token-prompt .token-prompt-title { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
.token-prompt .token-prompt-sub { font-size: 14px; color: #64748b; margin-bottom: 24px; line-height: 1.6; }
.token-upload-label {
  display: inline-block; background: #3b82f6; color: #fff;
  border-radius: 8px; padding: 12px 28px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background .2s;
}
.token-upload-label:hover { background: #2563eb; }
.token-upload-label input[type=file] { display: none; }

/* ── 거래명세서 생성 (기존) ── */
.invoice-card {
  background: #fff; border-radius: 16px;
  box-shadow: 0 1px 8px rgba(0,0,0,.08); padding: 36px 36px;
  max-width: 520px;
}
.invoice-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #1e293b; }
.invoice-card .sub { font-size: 13px; color: #94a3b8; margin-bottom: 28px; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 7px; }
.row2 { display: flex; gap: 12px; }
.row2 .field { flex: 1; }
.invoice-card select, .invoice-card input[type=date] {
  width: 100%; padding: 10px 12px; border: 1.5px solid #e0e6ef; border-radius: 8px;
  font-size: 14px; color: #222; outline: none; font-family: inherit;
}
.invoice-card select:focus, .invoice-card input[type=date]:focus { border-color: #3b82f6; }
.section-divider { border: none; border-top: 1.5px solid #f0f0f0; margin: 6px 0 18px; }
.btn-invoice {
  width: 100%; padding: 15px; background: #3b82f6; color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: background .2s; font-family: inherit; margin-top: 4px;
}
.btn-invoice:hover { background: #2563eb; }
.btn-invoice:disabled { background: #b0c4e8; cursor: not-allowed; }
.inv-status {
  margin-top: 16px; padding: 12px 15px; border-radius: 8px;
  font-size: 13px; display: none;
}
.inv-status.loading { background: #eef3ff; color: #3b82f6; display: block; }
.inv-status.error   { background: #fff0f0; color: #e05050; display: block; }
.inv-status.success { background: #f0fff4; color: #1b7a46; display: block; }
</style>
</head>
<body>

<!-- ── 상단 헤더 ── -->
<div class="app-header">
  <h1>📊 정산 대시보드</h1>
  <div class="header-upload">
    <div class="upload-btn" id="upload_btn">
      <input type="file" accept=".xlsx,.xls" id="data_file">
      <span id="upload_label">📂 엑셀 파일 업로드</span>
    </div>
    <button class="btn-clear-file" id="btn_clear_file" style="display:none" onclick="clearExcelFile()">✕ 파일 제거</button>
  </div>
  <div class="header-selects">
    <label>연도</label>
    <input type="number" id="year" min="2020" max="2099" style="width:76px">
    <label>월</label>
    <select id="month"></select>
    <button class="btn-load" id="btn_load">불러오기</button>
  </div>
</div>

<!-- ── 탭 ── -->
<div class="tabs">
  <div class="tab active" data-tab="dashboard">대시보드</div>
  <div class="tab" data-tab="detail">상세 내역</div>
  <div class="tab" data-tab="invoice">거래명세서 생성</div>
</div>

<!-- ── 대시보드 뷰 ── -->
<div class="view active" id="view-dashboard">
  <div class="status-bar" id="dash-status"></div>

  <!-- 관리자 컨트롤 (admin 모드에서만 표시) -->
  <div class="admin-controls" id="admin-controls">
    <div class="ac-title">🔐 관리자 — PDF 생성 / 슬랙 전송</div>

    <!-- 슬랙 토큰 설정 -->
    <div class="slack-token-row" id="slack-token-row">
      <span style="color:#94a3b8;font-size:12px">Slack Token</span>
      <input type="password" id="slack_token_input" placeholder="xoxp-... 또는 xoxb-..."
        style="background:#334155;border:1px solid #475569;border-radius:6px;color:#e2e8f0;font-size:12px;padding:5px 10px;outline:none;font-family:inherit;flex:1;min-width:0">
      <button class="btn-slack-save" onclick="saveSlackToken()">저장</button>
      <span id="slack_token_status" style="font-size:11px;color:#4ade80"></span>
    </div>

    <div class="admin-date-row">
      <div class="adf"><label>작업개시일</label><input type="date" id="a_date_start"></div>
      <div class="adf"><label>작업완료일</label><input type="date" id="a_date_end"></div>
      <div class="adf"><label>검수완료일</label><input type="date" id="a_date_inspect"></div>
      <div class="adf"><label>발행일</label><input type="date" id="a_date_issue"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">
      <button class="btn-slack-bulk" id="btn_slack_bulk" onclick="handleBulkSlack()">📢 전체 슬랙 전송</button>
      <span style="font-size:12px;color:#64748b">불러오기 후 전원에게 확인 링크 전송</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const ab = e.target.result;
    try {
      // 청크 단위로 base64 인코딩 (대용량 파일 스택 오버플로우 방지)
      const bytes = new Uint8Array(ab);
      let binary = '';
      for (let i = 0; i < bytes.length; i += 8192) {
        binary += String.fromCharCode(...bytes.subarray(i, i + 8192));
      }
      localStorage.setItem('excel_name', file.name);
      localStorage.setItem('excel_data', btoa(binary));
    } catch(err) { console.warn('localStorage 저장 실패:', err); }
    const wb = XLSX.read(new Uint8Array(ab), { type: 'array', cellDates: false });
    g_wb = wb;
    g_listInfo = loadListInfo(wb);
    setFileLoaded(file.name);
  };
  reader.readAsArrayBuffer(file);
}

function loadListInfo(wb) {
  if (!wb.SheetNames.includes('List')) return {};
  const rows = XLSX.utils.sheet_to_json(wb.Sheets['List'], { defval: '' });
  const info = {};
  for (const row of rows) {
    const n1 = String(row['이름'] || '').trim();
    const n2 = String(row['영문 이름'] || '').trim();
    if (n1) info[n1] = row;
    if (n2) info[n2] = row;
  }
  return info;
}

function getMonthRows(wb, sheetName, month) {
  if (!wb.SheetNames.includes(sheetName)) return [];
  const ws = wb.Sheets[sheetName];
  if (!ws['!ref']) return [];
  const range = XLSX.utils.decode_range(ws['!ref']);

  // 헤더 → 컬럼 인덱스 매핑
  const headers = {};
  for (let c = range.s.c; c <= range.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({ r: range.s.r, c })];
    if (cell && cell.v != null) headers[String(cell.v).trim()] = c;
  }

  const result = [];
  for (let r = range.s.r + 1; r <= range.e.r; r++) {
    const row = {};
    for (const [header, c] of Object.entries(headers)) {
      const cell = ws[XLSX.utils.encode_cell({ r, c })];
      row[header] = cell ? (cell.v ?? '') : '';
      // 완성물 컬럼 하이퍼링크 추출
      if (header === '완성물' && cell && cell.l && cell.l.Target) {
        row['_완성물_url'] = cell.l.Target;
      }
    }
    if (parseInt(row['기간 (월)'] || 0) === month) result.push(row);
  }
  return result;
}

function aggregate(rows) {
  const agg = {};
  for (const r of rows) {
    const 품명 = String(r['품명'] || '').trim();
    const key  = 품명.toLowerCase();
    const 단어수   = parseFloat(r['단어수/시간'] || 0) || 0;
    const 단가     = parseFloat(r['단가(원)'] || r['단가(USD)'] || 0) || 0;
    const 공급가액 = parseFloat(r['공급가액'] || 0) || 0;
    const 품명2        = String(r['품명2'] || '').trim();
    const 품명2_단어수 = parseFloat(r['품명2 단어수/시간'] || 0) || 0;
    const 품명2_단가   = parseFloat(r['품명2 단가(원)'] || r['품명2 단가(USD)'] || 0) || 0;
    const 품명2_공급가액 = (품명2 && 품명2.toLowerCase() !== 'nan' && 품명2_단어수 > 0)
      ? 품명2_단어수 * 품명2_단가 : 0;
    if (key && key !== 'nan') {
      if (!agg[key]) agg[key] = { 표시명: 품명, 단어수: 0, 단가, 공급가액: 0 };
      agg[key].단어수   += 단어수;
      // 엑셀 공급가액에 repetition이 포함되어 있으므로 제외
      agg[key].공급가액 += 공급가액 - 품명2_공급가액;
    }
    if (품명2_공급가액 > 0) {
      const k2 = 품명2.toLowerCase();
      if (!agg[k2]) agg[k2] = { 표시명: 품명2, 단어수: 0, 단가: 품명2_단가, 공급가액: 0 };
      agg[k2].단어수   += 품명2_단어수;
      agg[k2].공급가액 += 품명2_공급가액;
    }
  }
  return agg;
}

function isUSD(wb, sheetName) {
  const ws = wb.Sheets[sheetName];
  if (!ws || !ws['!ref']) return false;
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let r = range.s.r; r <= Math.min(range.s.r + 1, range.e.r); r++)
    for (let c = range.s.c; c <= range.e.c; c++) {
      const cell = ws[XLSX.utils.encode_cell({ r, c })];
      if (cell && String(cell.v).includes('USD')) return true;
    }
  return false;
}

function serialToKorDate(serial) {
  if (!serial && serial !== 0) return '';
  if (typeof serial === 'string') return serial;
  const d = new Date(new Date(1899, 11, 30).getTime() + Math.round(Number(serial)) * 86400000);
  return korDate(d);
}

function korDate(d) {
  if (!d) return '';
  return `${d.getFullYear()}년 ${String(d.getMonth()+1).padStart(2,'0')}월 ${String(d.getDate()).padStart(2,'0')}일`;
}

function dateInputToKor(val) {
  if (!val) return '';
  const [y, m, d] = val.split('-');
  return `${y}년 ${m}월 ${d}일`;
}

function fmtAmt(n, usd, isZeroOk) {
  if ((!n && n !== 0) || (n === 0 && !isZeroOk)) return '-';
  if (usd) return n.toLocaleString('ko-KR', { minimumFractionDigits: 0, maximumFractionDigits: 3 });
  return Math.round(n).toLocaleString('ko-KR');
}

function fmtNum(n) {
  if (!n && n !== 0) return '-';
  return Math.round(n).toLocaleString('ko-KR');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function serialToDateStr(serial) {
  if (!serial) return '';
  if (typeof serial === 'string') {
    const s = serial.replace(/\D/g,'');
    if (s.length === 6) return `20${s.slice(0,2)}.${s.slice(2,4)}.${s.slice(4,6)}`;
    return serial;
  }
  const d = new Date(new Date(1899,11,30).getTime() + Math.round(Number(serial))*86400000);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

async function loadData() {
  if (!g_wb) {
    setDashStatus('error', '엑셀 파일을 먼저 업로드해주세요.');
    return;
  }
  const month = parseInt(document.getElementById('month').value);

  setDashStatus('loading', '<span class="spinner"></span> 데이터 분석 중...');
  document.getElementById('btn_load').disabled = true;

  try {
    await new Promise(r => setTimeout(r, 30));
    g_results = [];

    for (const [sheetName, sheetMeta] of Object.entries(SHEET_TO_INFO)) {
      const rows = getMonthRows(g_wb, sheetName, month);
      if (!rows.length) continue;
      const info = g_listInfo[sheetMeta.영문명];
      const agg  = aggregate(rows);
      const usd  = isUSD(g_wb, sheetName);
      const 소계 = Object.values(agg).reduce((s,v) => s + v.공급가액, 0);
      g_results.push({ sheetName, sheetMeta, rows, agg, usd, 소계, info });
    }

    renderDashboard(month);
    renderDetailSelect();

    if (!g_results.length) {
      setDashStatus('error', `${month}월 데이터가 없습니다.`);
    } else {
      setDashStatus('success', `✅ ${month}월 데이터 ${g_results.length}명 로드 완료`);
      // Supabase 토큰 동기화 + 확인 상태 반영
      const year = parseInt(document.getElementById('year').value);
      syncTokensToSupabase(year, month).then(() =>
        loadConfirmStatesFromSupabase(year, month).then(() => {
          renderDashboard(month);
          startDashboardPolling();
        })
      ).catch(e => console.error('Supabase 동기화 실패:', e));
    }
  } catch(e) {
    setDashStatus('error', '오류: ' + e.message);
  } finally {
    document.getElementById('btn_load').disabled = false;
  }

function confirmStateKey(sheetName, month) {
  return `${sheetName}_${month}`;
}

function renderConfirmBox(sheetName, month) {
  const box = document.getElementById('confirm-box');
  const actionEl = document.getElementById('confirm-action');
  box.style.display = 'block';

  const key   = confirmStateKey(sheetName, month);
  const state = g_confirmState[key];

  if (state && state.status === 'confirmed') {
    const dt = new Date(state.confirmedAt);
    const dtStr = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    actionEl.innerHTML = `
      <div class="confirm-done">
        <span class="done-icon">✅</span>
        <div>
          <div class="done-text">이상 없음으로 제출되었습니다.</div>
          <div class="done-time">제출일시: ${dtStr}</div>
        </div>
      </div>`;
  } else {
    actionEl.innerHTML = `<button class="btn-confirm" onclick="handleConfirm('${sheetName}', ${month})">이상 없음</button>`;
  }
}

async function handleConfirm(sheetName, month) {
  const ok = confirm('작업내역을 확인했으며 이상이 없습니다. 제출하시겠습니까?');
  if (!ok) return;

  const key = confirmStateKey(sheetName, month);
  const now = new Date().toISOString();
  g_confirmState[key] = { status: 'confirmed', confirmedAt: now };

  renderConfirmBox(sheetName, month);
  updateDashboardCard(sheetName);

  // Supabase 업데이트
  const token = g_tokenMode ? g_tokenData.token : g_tokens[key];
  if (token) {
    try {
      await supaFetch(
        `freelancer_tokens?token=eq.${encodeURIComponent(token)}`,
        'PATCH',
        { status: 'confirmed', confirmed_at: now }
      );
    } catch(e) {
      console.error('Supabase 확인 저장 실패:', e);
    }
  }

  // 토큰 모드: 확인 완료 화면으로 전환
  if (g_tokenMode) {
    g_tokenData.status = 'confirmed';
    g_tokenData.confirmed_at = now;
    showTokenAlreadyConfirmed();
  }
}

// ──────────────────────────────────────────────────────────
// PDF Blob 생성 (기존 makeInvoiceContent 재사용)
// ──────────────────────────────────────────────────────────
async function generatePdfBlob(result, dates) {
  const html = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
    <style>${INVOICE_CSS}</style></head><body>
    ${makeInvoiceContent(result.info, result.sheetMeta, result.agg, result.usd, dates)}
    </body></html>`;

  return new Promise((resolve, reject) => {
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;height:1123px;border:none;background:#fff;';
    iframe.srcdoc = html;
    document.body.appendChild(iframe);
    iframe.onload = async () => {
      try {
        await new Promise(r => setTimeout(r, 400));
        const canvas = await html2canvas(iframe.contentDocument.documentElement, {
          scale: 2, useCORS: true, logging: false,
          width: 794, height: 1123, windowWidth: 794, windowHeight: 1123,
          backgroundColor: '#ffffff',
        });
        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        const pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pw = pdf.internal.pageSize.getWidth();
        const ph = pdf.internal.pageSize.getHeight();
        const ih = (canvas.height / canvas.width) * pw;
        let pos = 0, left = ih, first = true;
        while (left > 0) {
          if (!first) pdf.addPage();
          pdf.addImage(imgData, 'JPEG', 0, -pos, pw, ih);
          pos += ph; left -= ph; first = false;
        }
        resolve(pdf.output('blob'));
      } catch(e) { reject(e); }
      finally { document.body.removeChild(iframe); }
    };
  });
}

// 관리자: 선택자 일괄 PDF 생성 (브라우저 다운로드)

document.getElementById('btn_pdf_bulk')?.addEventListener('click', handleBulkPdf);

async function handleBulkPdf() {
  const indices = [...g_selected];
  if (!indices.length) return;

  const btn  = document.getElementById('btn_pdf_bulk');
  const prog = document.getElementById('pdf-progress');
  btn.disabled = true;

  const month = parseInt(document.getElementById('month').value);
  const year  = parseInt(document.getElementById('year').value);
  const dates = getAdminDates();

  for (let i = 0; i < indices.length; i++) {
    const idx = indices[i];
    const r   = g_results[idx];
    const 이름 = r.info ? (r.info['이름'] || r.sheetMeta.영문명) : r.sheetMeta.영문명;
    const filename = `${year}.${String(month).padStart(2,'0')}_${이름}_거래명세서`;

    prog.textContent = `📄 (${i+1}/${indices.length}) ${이름} 생성 중...`;
    try {
      const blob = await generatePdfBlob(r, dates);

      // 브라우저 다운로드
      downloadBlob(blob, filename + '.pdf');

      const key = confirmStateKey(r.sheetName, month);
      const pdfAt = new Date().toISOString();
      g_confirmState[key] = {
        ...g_confirmState[key],
        status: 'pdf_generated',
        pdfGeneratedAt: pdfAt,
        filename: filename + '.pdf',
      };
      const token = g_tokens[key];
      if (token) {
        supaFetch(
          `freelancer_tokens?token=eq.${encodeURIComponent(token)}`,
          'PATCH',
          { status: 'pdf_generated', pdf_generated_at: pdfAt }
        ).catch(e => console.error('Supabase PDF 상태 업데이트 실패:', e));
      }
    } catch(e) {
      prog.textContent = `❌ ${이름} 실패: ${e.message}`;
      await new Promise(r => setTimeout(r, 1500));
    }
    await new Promise(r => setTimeout(r, 300));
  }

  g_selected.clear();
  prog.textContent = `✅ ${indices.length}명 PDF 다운로드 완료`;
  renderDashboard(month);
  btn.disabled = false;
}

// 개별 재생성
async function regenPdf(idx) {
  const month = parseInt(document.getElementById('month').value);
  const year  = parseInt(document.getElementById('year').value);
  const dates = getAdminDates();
  const r     = g_results[idx];
  if (!r) return;

  const btn = document.querySelector(`#fl-card-${idx} .btn-pdf-regen`);
  if (btn) { btn.textContent = '생성 중...'; btn.disabled = true; }

  const 이름 = r.info ? (r.info['이름'] || r.sheetMeta.영문명) : r.sheetMeta.영문명;
  const filename = `${year}.${String(month).padStart(2,'0')}_${이름}_거래명세서`;

  try {
    const blob = await generatePdfBlob(r, dates);
    downloadBlob(blob, filename + '.pdf');

    const key = confirmStateKey(r.sheetName, month);
    const pdfAt = new Date().toISOString();
    g_confirmState[key] = {
      ...g_confirmState[key],
      status: 'pdf_generated',
      pdfGeneratedAt: pdfAt,
      filename: filename + '.pdf',
    };
    const token = g_tokens[key];
    if (token) {
      supaFetch(
        `freelancer_tokens?token=eq.${encodeURIComponent(token)}`,
        'PATCH',
        { status: 'pdf_generated', pdf_generated_at: pdfAt }
      ).catch(e => console.error('Supabase PDF 상태 업데이트 실패:', e));
    }
    renderDashboard(month);
  } catch(e) {
    alert('PDF 생성 실패: ' + e.message);
    if (btn) { btn.textContent = '재생성'; btn.disabled = false; }
  }
}

// Supabase 토큰 동기화 / 상태 로드

async function syncTokensToSupabase(year, month) {
  const rows = g_results.map(r => ({
    sheet_name: r.sheetName,
    freelancer_name: r.info ? (r.info['이름'] || r.sheetMeta.영문명) : r.sheetMeta.영문명,
    month,
    year,
    rows_json: {
      sheetMeta: r.sheetMeta,
      rows: r.rows,
      agg: r.agg,
      usd: r.usd,
      소계: r.소계,
      info: r.info || null,
    },
  }));
  if (!rows.length) return;
  const result = await supaFetch(
    'freelancer_tokens?on_conflict=sheet_name,month,year',
    'POST',
    rows,
    'resolution=merge-duplicates,return=representation'
  );
  if (result) {
    for (const row of result) {
      g_tokens[confirmStateKey(row.sheet_name, month)] = row.token;
    }
  }
}

async function loadConfirmStatesFromSupabase(year, month) {
  const rows = await supaFetch(
    `freelancer_tokens?month=eq.${month}&year=eq.${year}&select=*`
  );
  if (!rows) return;
  for (const row of rows) {
    const key = confirmStateKey(row.sheet_name, month);
    g_tokens[key] = row.token;
    if (row.status !== 'pending') {
      g_confirmState[key] = {
        status: row.status,
        confirmedAt: row.confirmed_at,
        pdfGeneratedAt: row.pdf_generated_at,
      };
    }
  }
}

async function resetConfirm(sheetName, month, cardIdx) {
  if (!confirm(`${sheetName}의 확인 상태를 초기화하고 프리랜서에게 재확인을 요청하시겠습니까?`)) return;
  const key = confirmStateKey(sheetName, month);
  const token = g_tokens[key];
  const r = g_results.find(r => r.sheetName === sheetName);
  try {
    await supaFetch(
      `freelancer_tokens?token=eq.${encodeURIComponent(token)}`,
      'PATCH',
      {
        status: 'pending',
        confirmed_at: null,
        pdf_generated_at: null,
        rows_json: r ? {
          sheetMeta: r.sheetMeta, rows: r.rows, agg: r.agg,
          usd: r.usd, 소계: r.소계, info: r.info || null,
        } : undefined,
      }
    );
    delete g_confirmState[key];
    renderDashboard(month);
  } catch(e) {
    alert('초기화 실패: ' + e.message);
  }
}

function copyFreelancerLink(token, name, cardIdx) {
  const url = `${location.origin}${location.pathname}?token=${token}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById(`cpbtn_${cardIdx}`);
    if (btn) {
      btn.textContent = '✅ 복사됨';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '🔗 링크 복사'; btn.classList.remove('copied'); }, 2000);
    }
  }).catch(() => {
    prompt(`${name} 링크를 복사하세요:`, url);
  });
}

async function handleTokenFileUpload(file) {
  if (!file) return;
  const infoEl = document.getElementById('detail-info');

  try {
    const wb = await parseExcel(file);
    g_wb = wb;
    g_listInfo = loadListInfo(wb);

    const month     = g_tokenData.month;
    const sheetName = g_tokenData.sheet_name;

    if (!SHEET_TO_INFO[sheetName]) {
      infoEl.innerHTML = `<div style="padding:30px;text-align:center;color:#ef4444">시트를 찾을 수 없습니다. 올바른 파일인지 확인해주세요.</div>`;
      return;
    }
    const sheetMeta = SHEET_TO_INFO[sheetName];
    const rows = getMonthRows(wb, sheetName, month);
    if (!rows.length) {
      infoEl.innerHTML = `<div style="padding:30px;text-align:center;color:#ef4444">${month}월 데이터가 없습니다.</div>`;
      return;
    }

    const info = g_listInfo[sheetMeta.영문명];
    const agg  = aggregate(rows);
    const usd  = isUSD(wb, sheetName);
    const 소계 = Object.values(agg).reduce((s,v) => s + v.공급가액, 0);
    g_results  = [{ sheetName, sheetMeta, rows, agg, usd, 소계, info }];

    // 연도/월 input을 토큰 값으로 설정 (renderDetail 내부에서 읽음)
    document.getElementById('year').value  = g_tokenData.year;
    document.getElementById('month').value = g_tokenData.month;

    renderDetailSelect();
    document.getElementById('detail-select').value = 0;
    infoEl.style.display = 'none';
    renderDetail();
  } catch(e) {
    infoEl.innerHTML = `<div style="padding:30px;text-align:center;color:#ef4444">오류: ${e.message}</div>`;
  }
}

function saveSlackToken() {
  const val = document.getElementById('slack_token_input').value.trim();
  if (!val) return;
  localStorage.setItem('slack_token', val);
  document.getElementById('slack_token_input').value = '';
  document.getElementById('slack_token_status').textContent = '✅ 저장됨';
  setTimeout(() => { document.getElementById('slack_token_status').textContent = ''; }, 2000);
}

function getSlackToken() {
  return localStorage.getItem('slack_token') || '';
}

async function slackPostMessage(channel, text) {
  const token = getSlackToken();
  if (!token) { alert('슬랙 토큰을 먼저 설정해주세요.'); return false; }
  const res = await fetch('https://slack.com/api/chat.postMessage', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel, text }),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || '전송 실패');
  return true;
}

function makeSlackMessage(이름, month, year, token) {
  const link = `${location.origin}${location.pathname}?token=${token}`;
  return `@${이름} 님, 안녕하세요!\n${year}년 ${month}월 작업내역 확인 부탁드립니다 :)\n👉 ${link}`;
}

async function sendOneSlack(idx) {
  const month = parseInt(document.getElementById('month').value);
  const year  = parseInt(document.getElementById('year').value);
  const r     = g_results[idx];
  if (!r) return;
  const 이름    = r.info ? (r.info['이름'] || r.sheetMeta.영문명) : r.sheetMeta.영문명;
  const channel = r.info ? String(r.info['슬랙 채널'] || '').trim() : '';
  const token   = g_tokens[confirmStateKey(r.sheetName, month)];
  if (!channel) { alert('slack_channel 정보가 없습니다.'); return; }
  if (!token)   { alert('링크 토큰이 없습니다. 불러오기를 먼저 실행해주세요.'); return; }
  const btn = document.getElementById(`slackbtn_${idx}`);
  if (btn) { btn.textContent = '전송 중...'; btn.disabled = true; }
  try {
    await slackPostMessage(channel, makeSlackMessage(이름, month, year, token));
    if (btn) { btn.textContent = '✅ 전송완료'; btn.classList.add('sent'); }
  } catch(e) {
    alert(`${이름} 전송 실패: ${e.message}`);
    if (btn) { btn.textContent = '💬 슬랙 전송'; btn.disabled = false; }
  }
}

async function handleBulkSlack() {
  if (!g_results.length) { alert('먼저 불러오기를 실행해주세요.'); return; }
  if (!confirm(`${g_results.length}명 전원에게 슬랙 메시지를 전송하시겠습니까?`)) return;
  const month = parseInt(document.getElementById('month').value);
  const year  = parseInt(document.getElementById('year').value);
  const prog  = document.getElementById('pdf-progress');
  const btn   = document.getElementById('btn_slack_bulk');
  btn.disabled = true;
  let ok = 0, fail = 0, noChannel = 0;
  for (let idx = 0; idx < g_results.length; idx++) {
    const r       = g_results[idx];
    const 이름    = r.info ? (r.info['이름'] || r.sheetMeta.영문명) : r.sheetMeta.영문명;
    const channel = r.info ? String(r.info['슬랙 채널'] || '').trim() : '';
    const token   = g_tokens[confirmStateKey(r.sheetName, month)];
    prog.textContent = `💬 (${idx+1}/${g_results.length}) ${이름} 전송 중...`;
    if (!channel) { noChannel++; continue; }
    if (!token)   { fail++; continue; }
    try {
      await slackPostMessage(channel, makeSlackMessage(이름, month, year, token));
      ok++;
    } catch(e) { fail++; }
    await new Promise(r => setTimeout(r, 300));
  }
  btn.disabled = false;
  prog.textContent = `✅ ${ok}명 전송 완료${fail ? ` / ❌ ${fail}명 실패` : ''}${noChannel ? ` / ⚠️ ${noChannel}명 채널 없음` : ''}`;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

  .sched-row { display: flex; margin-bottom: 3pt; }
  .sched-lbl { min-width: 90pt; font-weight: bold; font-size: 9pt; }
  .sched-val { font-size: 9pt; }
  .indent { padding-left: 6pt; font-size: 9pt; line-height: 1.5; }
  .date-line { text-align: center; margin: 18pt 0 14pt; font-size: 9.5pt; }
  .party { margin-bottom: 12pt; }
  .party-title { font-weight: bold; margin-bottom: 5pt; }
  .party-row { display: flex; margin-bottom: 3.5pt; align-items: baseline; }
  .party-lbl { min-width: 60pt; font-size: 9pt; flex-shrink: 0; }
  .party-val { flex: 1; font-size: 9pt; }
  .party-stamp { margin-left: auto; padding-left: 10pt; font-size: 9pt; flex-shrink: 0; }
  .mgr-row { display: flex; align-items: baseline; margin-top: 4pt; }
`;

function makeInvoiceContent(info, sheetMeta, agg, usd, dates) {
  const 이름       = String(info['영문 이름'] || info['이름'] || sheetMeta.영문명).trim();
  const 계약일_str = serialToKorDate(info['계약시작']);
  const 신분증번호 = String(info['주민등록번호'] || info['여권번호'] || '');
  const 주소       = String(info['주소'] || '');
  const 연락처     = String(info['연락처'] || '');

  const ds = dateInputToKor(dates.start), de = dateInputToKor(dates.end);
  const inspect = dateInputToKor(dates.inspect), issue = dateInputToKor(dates.issue);

  const items = Object.values(agg);
  const 소계  = items.reduce((s,v) => s + v.공급가액, 0);

  let 세금 = 0, 총계, 특이사항;
  if (usd) {
    const 소계_3 = Math.round(소계 * 1000) / 1000;
    const 소계_2 = Math.round(소계 * 100)  / 100;
    const needsCeil = Math.abs(소계_3 - 소계_2) >= 0.0005;
    총계     = needsCeil ? Math.ceil(소계 * 100) / 100 : 소계;
    특이사항 = needsCeil ? '소수점 셋째 자리에서 올림' : '없음';
  } else {
    세금     = Math.floor(소계 * 0.033 / 10) * 10;
    총계     = 소계 - 세금;
    특이사항 = '없음';
  }

  const _fmtAmt = (n, isZeroOk) => fmtAmt(n, usd, isZeroOk);
  const 단가헤더 = usd ? '단가(USD)' : '단가(원)';
  const 공급가액헤더 = usd ? '공급가액(USD)' : '공급가액(원)';

  let itemRows = '';
  for (let i = 0; i < 6; i++) {
    if (i < items.length) {
      const v = items[i];
      itemRows += `<tr>
        <td class="c">${esc(v.표시명)}</td>
        <td class="c">구글시트, JIRA</td>
        <td class="r">${v.단어수 > 0 ? Number(v.단어수.toFixed(2)).toLocaleString('ko-KR') : '-'}</td>
        <td class="r">${_fmtAmt(v.단가, false)}</td>
        <td class="r">${_fmtAmt(v.공급가액, false)}</td>
      </tr>`;
    } else {
      itemRows += '<tr><td></td><td></td><td></td><td></td><td></td></tr>';
    }
  }

  const taxRow = !usd
    ? `<tr class="sum"><td class="lbl" colspan="3">세금</td><td class="c" style="font-size:8.5pt">(사업소득 3.3%)</td><td class="r">${fmtNum(세금)}</td></tr>`
    : '';

  return `
<div class="invoice">
  <div class="title">첨부 1. 거래명세서</div>
  <p class="contract-text">본 거래 명세서는 ${계약일_str}에 계약 된 ㈜쿡앱스(이하 "갑")와 ${esc(이름)}(이하 "을")간의 포괄적 협력 계약에 따른다.</p>
  <div class="section">
    <div class="sec-title">1. 작업내용</div>
    <table class="work">
      <thead><tr>
        <th style="width:22%">품명</th><th style="width:22%">형식</th>
        <th style="width:18%">단어수/시간</th><th style="width:18%">${단가헤더}</th>
        <th style="width:20%">${공급가액헤더}</th>
      </tr></thead>
      <tbody>
        ${itemRows}
        <tr class="sum"><td class="lbl" colspan="4">소계</td><td class="r">${_fmtAmt(소계, true)}</td></tr>
        ${taxRow}
        <tr class="sum total"><td class="lbl" colspan="4">총계</td><td class="r">${_fmtAmt(총계, true)}</td></tr>
      </tbody>
    </table>
  </div>
  <div class="section">
    <div class="sec-title">2. 작업일정</div>
    <div class="sched">
      <div class="sched-row"><span class="sched-lbl">작업개시일 :</span><span class="sched-val">${ds}</span></div>
      <div class="sched-row"><span class="sched-lbl">작업완료일(납품일) :</span><span class="sched-val">${de}</span></div>
    </div>
  </div>
  <div class="section"><div class="sec-title">3. 검수완료일</div><div class="indent">${inspect}</div></div>
  <div class="section"><div class="sec-title">4. 대금지급일</div><div class="indent">검수 완료 후, "을"이 명세서를 수령한 일자로부터 30일 이내 지급</div></div>
  <div class="section"><div class="sec-title">5. 특이사항</div><div class="indent">${특이사항}</div></div>
  <div class="date-line">${issue}</div>
  <div class="party">
    <div class="party-title">「갑」</div>
    <div class="party-row"><span class="party-lbl">회사명:</span><span class="party-val">${esc(COMPANY.name)}</span></div>
    <div class="party-row"><span class="party-lbl">주소:</span><span class="party-val">${esc(COMPANY.addr)}</span></div>
    <div class="party-row"><span class="party-lbl">사업자번호:</span><span class="party-val">${COMPANY.biz}</span></div>
    <div class="party-row"><span class="party-lbl">대표:</span><span class="party-val">${esc(COMPANY.ceo)}</span><span class="party-stamp">(인)</span></div>
  </div>
  <div class="party">
    <div class="party-title">「을」</div>
    <div class="party-row"><span class="party-lbl">신분증번호:</span><span class="party-val">${esc(신분증번호)}</span></div>
    <div class="party-row"><span class="party-lbl">주소:</span><span class="party-val">${esc(주소)}</span></div>
    <div class="party-row"><span class="party-lbl">연락처</span><span class="party-val">${esc(연락처)}</span></div>
    <div class="party-row"><span class="party-lbl">성명</span><span class="party-val">${esc(이름)}</span><span class="party-stamp">(인)</span></div>
  </div>
  <div class="mgr-row"><span class="party-lbl">담당자:</span><span class="party-val">${esc(COMPANY.mgr)}</span><span class="party-stamp">(인)</span></div>
</div>`;
}

async function generateInvoice() {
  if (!g_wb) { setInvStatus('error', '먼저 상단에서 엑셀 파일을 업로드하고 불러오기를 클릭해주세요.'); return; }
  if (!g_results.length) { setInvStatus('error', '불러오기를 먼저 실행해주세요.'); return; }

  const dates = {
    start:   document.getElementById('date_start').value,
    end:     document.getElementById('date_end').value,
    inspect: document.getElementById('date_inspect').value,
    issue:   document.getElementById('date_issue').value,
  };
  const month = parseInt(document.getElementById('month').value);

  setInvStatus('loading', '<span class="spinner"></span> 처리 중...');
  document.getElementById('btn_print').disabled = true;

  try {
    const results = g_results
      .filter(r => r.info)
      .map(r => {
        const html = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><style>${INVOICE_CSS}</style></head><body>${makeInvoiceContent(r.info, r.sheetMeta, r.agg, r.usd, dates)}</body></html>`;
        return { displayName: r.sheetName, html, filename: `${month}월_${r.sheetMeta.영문명}` };
      });

    if (!results.length) { setInvStatus('error', '명세서 생성 가능한 데이터가 없습니다.'); return; }

    const previewWin = window.open('', '_blank');
    if (!previewWin) { setInvStatus('error', '팝업이 차단됐습니다. 팝업 허용 후 다시 시도해주세요.'); return; }

    const htmlsJson     = JSON.stringify(results.map(r => r.html));
    const namesJson     = JSON.stringify(results.map(r => r.displayName));
    const filenamesJson = JSON.stringify(results.map(r => r.filename));

    const previewBody = `
<style>
  ${INVOICE_CSS}
  @media print { .toolbar { display: none !important; } }
  body { background: #e8ecf0; }
  .toolbar {
    position: sticky; top: 0; z-index: 99;
    background: #1e293b; padding: 12px 16px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    border-bottom: 3px solid #334155;
  }
  .toolbar .lbl { color: #94a3b8; font-size: 12px; font-family: 'Malgun Gothic', sans-serif; margin-right: 4px; white-space: nowrap; }
  .toolbar .sep { color: #475569; margin: 0 4px; }
  .btn-all { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; white-space: nowrap; }
  .btn-all:hover { background: #2563eb; }
  .btn-nav { background: #475569; color: #fff; border: none; border-radius: 6px; padding: 7px 13px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; white-space: nowrap; }
  .btn-nav:hover { background: #334155; }
  .btn-one { background: #059669; color: #fff; border: none; border-radius: 6px; padding: 7px 13px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; white-space: nowrap; }
  .btn-one:hover { background: #047857; }
  .invoice-wrap { background: #fff; max-width: 210mm; margin: 20px auto; padding: 0; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
  .inv-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; }
  .inv-name { font-family: 'Malgun Gothic', sans-serif; font-size: 13px; font-weight: 700; color: #334155; }
</style>
<div class="toolbar">
  <span class="lbl">바로가기 →</span>
  <div id="one_btns"></div>
  <span class="sep">|</span>
  <button class="btn-all" id="btn_all">💾 전체 저장 (${results.length}개)</button>
</div>
<div id="previews"></div>
<script>
var HTMLS=${htmlsJson}, NAMES=${namesJson}, FILENAMES=${filenamesJson};
async function savePDF(idx) {
  var btn=document.getElementById('save_btn_'+idx), orig=btn?btn.textContent:'';
  if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  var iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;left:-9999px;top:0;width:794px;height:1123px;border:none;background:#fff;';
  iframe.srcdoc=HTMLS[idx];
  document.body.appendChild(iframe);
  try {
    await new Promise(function(res){iframe.onload=res;});
    await new Promise(function(res){setTimeout(res,400);});
    var canvas=await html2canvas(iframe.contentDocument.documentElement,{scale:2,useCORS:true,logging:false,width:794,height:1123,windowWidth:794,windowHeight:1123,backgroundColor:'#ffffff'});
    var imgData=canvas.toDataURL('image/jpeg',0.95);
    var pdf=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    var ih=(canvas.height/canvas.width)*pw;
    var pos=0,left=ih,first=true;
    while(left>0){if(!first)pdf.addPage();pdf.addImage(imgData,'JPEG',0,-pos,pw,ih);pos+=ph;left-=ph;first=false;}
    pdf.save(FILENAMES[idx]+'.pdf');
  } catch(e){alert('PDF 저장 실패: '+e.message);}
  finally{document.body.removeChild(iframe);if(btn){btn.textContent=orig;btn.disabled=false;}}
}
async function saveAll() {
  var allBtn=document.getElementById('btn_all');allBtn.disabled=true;
  for(var i=0;i<HTMLS.length;i++){allBtn.textContent='저장 중... ('+(i+1)+'/'+HTMLS.length+')';await savePDF(i);await new Promise(function(res){setTimeout(res,300);});}
  allBtn.textContent='💾 전체 저장 ('+HTMLS.length+'개)';allBtn.disabled=false;
}
document.getElementById('btn_all').onclick=saveAll;
var oneDiv=document.getElementById('one_btns');
NAMES.forEach(function(name,i){
  var btn=document.createElement('button');btn.className='btn-nav';btn.textContent=name;
  btn.onclick=(function(idx){return function(){var el=document.getElementById('inv_'+idx);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});};})(i);
  oneDiv.appendChild(btn);
});
var prevDiv=document.getElementById('previews');
HTMLS.forEach(function(html,i){
  var wrap=document.createElement('div');wrap.className='invoice-wrap';wrap.id='inv_'+i;
  var header=document.createElement('div');header.className='inv-header';
  header.innerHTML='<span class="inv-name">'+NAMES[i]+'</span>';
  var btn=document.createElement('button');btn.className='btn-one';btn.id='save_btn_'+i;
  btn.textContent='이 명세서만 저장';btn.onclick=(function(idx){return function(){savePDF(idx);};})(i);
  header.appendChild(btn);wrap.appendChild(header);
  var iframe=document.createElement('iframe');iframe.style.cssText='width:100%;height:297mm;border:none;display:block;';
  iframe.srcdoc=html;wrap.appendChild(iframe);prevDiv.appendChild(wrap);
});
<\/script>`;

    previewWin.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>거래명세서 미리보기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script>
</head><body>${previewBody}</body></html>`);
    previewWin.document.close();
    setInvStatus('success', `✅ ${results.length}개 명세서 미리보기가 열렸어요.`);
  } catch(e) {
    setInvStatus('error', '오류: ' + e.message);
  } finally {
    document.getElementById('btn_print').disabled = false;
  }
}

function setInvStatus(type, html) {
  const el = document.getElementById('inv-status');
  el.className = 'inv-status ' + type;
  el.innerHTML = html;
}
</script>
</body>
</html>
